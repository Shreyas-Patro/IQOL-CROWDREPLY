<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — IQOL CROWDREPLY</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <p class="text-xs font-semibold tracking-[0.18em] text-zinc-500 uppercase">IQOL CROWDREPLY</p>
      <p class="text-xs text-zinc-700 mt-1">Reddit brand-mention engine for alldoors.in</p>
    </div>

    <!-- Card -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-8">

      <h2 class="text-base font-semibold text-zinc-100 mb-6">Sign in</h2>

      {% if error %}
      <div class="mb-5 rounded-lg bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-400">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">

        <div>
          <label for="email" class="block text-xs font-medium text-zinc-400 mb-1.5">Email</label>
          <input
            type="email" id="email" name="email" required autocomplete="email"
            class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-600
                   focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500/60 transition-colors"
            placeholder="you@example.com">
        </div>

        <div>
          <label for="password" class="block text-xs font-medium text-zinc-400 mb-1.5">Password</label>
          <input
            type="password" id="password" name="password" required autocomplete="current-password"
            class="w-full rounded-lg bg-zinc-800 border border-zinc-700 px-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-600
                   focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500/60 transition-colors"
            placeholder="••••••••">
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] px-4 py-2.5
                 text-sm font-semibold text-white transition-all mt-1">
          Sign in
        </button>

      </form>

      <p class="text-center text-xs text-zinc-600 mt-6">For internal use — AllDoors.in</p>

    </div>
  </div>

</body>
</html>
